services:
  simuapi:
    build: . # Buildear el Dockerfile de esta carpeta (.)
    image: backend # Ponele "backend" de nombre a la imagen
    command: npx nodemon app.js
    ports:
      - "8000:8000"
    environment:
      DB_HOST: "db"
      DB_PORT: "5432"
      DB_USER: "backend_user"
      DB_PASS: "password-super-secreta"
      DB_NAME: "san_civilizacion_db"
    volumes:
      - ./app:/app
      - /app/node_modules

  db:
    image: postgres:18
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: "backend_user"
      POSTGRES_PASSWORD: "password-super-secreta"
      POSTGRES_DB: "san_civilizacion_db"
    volumes:
      - ./data:/var/lib/postgresql
      - ./app/db/schemas.sql:/docker-entrypoint-initdb.d/schemas.sql:ro
