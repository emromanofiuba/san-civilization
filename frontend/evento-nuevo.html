<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>San Civilization</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
</head>
  <body>
    <div class="container">
        <nav class="navbar" role="navigation" aria-label="main navigation">
            <div class="navbar-brand">
                <a class="navbar-item" href="index.html"><strong>San Civilization</strong></a>

                <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navbarBasicExample">
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
                </a>
            </div>

            <div id="navbarBasicExample" class="navbar-menu">
                <div class="navbar-start">
                <a href="sociedades.html" class="navbar-item">Sociedades</a>
                <a href="eventos.html" class="navbar-item is-active">Eventos</a>
                <a href="grupos-etarios.html" class="navbar-item">Grupos etarios</a>
                <a class="navbar-item">Registros historicos</a>
                </div>
            </div>
        </nav>
        <section class="hero">
            <div class="hero-body">
                <p class="title">Evento</p>
                <div id="evento-data">
                    <div class="field">
                        <label class="label">Nombre</label>
                        <div class="control">
                            <input id="evento-nombre" class="input" type="text" placeholder="Nombre del evento">
                            <span id="error" class="has-text-danger"></span>
                        </div>
                    </div>
                    <div class="field">
                        <label class="label">Grupo Etario</label>
                        <div class="control">
                            <div class="select">
                                <select id="grupos-etarios-select">
                                </select>
                            </div>
                            <span id="error" class="has-text-danger"></span>
                        </div>
                    </div>
                    <div class="field">
                        <label class="label">Año desde</label>
                        <div class="control">
                            <input id="evento-anio-desde" class="input" type="text" placeholder="Año en que comienza el evento">
                            <span id="error" class="has-text-danger"></span>
                        </div>
                    </div>
                    <div class="field">
                        <label class="label">Año hasta</label>
                        <div class="control">
                            <input id="evento-anio-hasta" class="input" type="text" placeholder="Año en que termina el evento">
                            <span id="error" class="has-text-danger"></span>
                        </div>
                    </div>
                    <div class="field">
                        <label class="label">Natalidad</label>
                        <div class="control">
                            <input id="evento-natalidad" class="input" type="text" placeholder="Modificación de la natalidad">
                            <span id="error" class="has-text-danger"></span>
                        </div>
                    </div>
                    <div class="field">
                        <label class="label">Mortalidad</label>
                        <div class="control">
                            <input id="evento-mortalidad" class="input" type="text" placeholder="Modificación de la mortalidad">
                            <span id="error" class="has-text-danger"></span>
                        </div>
                    </div>
                    <button onclick="nuevoEvento()" class="button is-primary">Guardar</button>
                </div>
            </div>
        </section>

        <footer class="footer">
            <div class="content has-text-centered">
                <p>
                <strong>San Civilization</strong> hecho por <a target="_blank" href="https://intro-camejo.com.ar/">Intro Camejo</a>.
                Por favor, no copiar, te estamos viendo!.
                </p>
            </div>
        </footer>
    </div>
    <script src="eventos.js"></script>
    <script>
        popularGruposEtarios();
    </script>
  </body>
</html>
