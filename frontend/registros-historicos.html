<!DOCTYPE html>
<html lang="es" data-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <nav class="navbar is-primary" role="navigation" aria-label="main navigation">
        <div class="container">
            <div class="navbar-brand">
                <a class="navbar-item" href="index.html">
                    <span class="icon"><i class="fas fa-earth-americas"></i></span>
                    <strong>San Civilization</strong>
                </a>
                <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="main-navbar">
                    <span aria-hidden="true"></span>
                    <span aria-hidden="true"></span>
                    <span aria-hidden="true"></span>
                    <span aria-hidden="true"></span>
                </a>
            </div>
            <div id="main-navbar" class="navbar-menu">
                <div class="navbar-start">
                    <a class="navbar-item" href="index.html"><span class="icon"><i class="fas fa-gauge-high"></i></span><span>Inicio</span></a>
                    <a class="navbar-item" href="sociedades.html"><span class="icon"><i class="fas fa-users-rectangle"></i></span><span>Sociedades</span></a>
                    <a class="navbar-item" href="grupos-etarios.html"><span class="icon"><i class="fas fa-people-group"></i></span><span>Grupos etarios</span></a>
                    <a class="navbar-item" href="eventos.html"><span class="icon"><i class="fas fa-bolt"></i></span><span>Eventos</span></a>
                    <a class="navbar-item is-active" href="registros-historicos.html"><span class="icon"><i class="fas fa-clock-rotate-left"></i></span><span>Registros históricos</span></a>
                </div>
            </div>
        </div>
    </nav>

    <main>
        <section class="section">
            <div class="container">
                <div class="level page-header is-mobile">
                    <div class="level-left">
                        <div class="level-item">
                            <div>
                                <h1 class="title">
                                    <span class="icon-text">
                                        <span class="icon has-text-primary"><i class="fas fa-clock-rotate-left"></i></span>
                                        <span>Registros históricos</span>
                                    </span>
                                </h1>
                                <p class="subtitle is-6 has-text-grey">La población de cada grupo etario año a año</p>
                            </div>
                        </div>
                    </div>
                    <div class="level-right">
                        <div class="level-item">
                            <div class="buttons">
                                <a href="empezar-sociedad.html" class="button is-link is-light">
                                    <span class="icon"><i class="fas fa-flag-checkered"></i></span>
                                    <span>Empezar sociedad</span>
                                </a>
                                <button onclick="avanzarUnAnio()" class="button is-primary">
                                    <span class="icon"><i class="fas fa-forward-step"></i></span>
                                    <span>Avanzar un año</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <p id="error" class="has-text-danger mb-3"></p>

                <div class="box">
                    <table class="table is-fullwidth is-striped is-hoverable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Sociedad</th>
                                <th>Grupo etario</th>
                                <th class="has-text-right">Año</th>
                                <th class="has-text-right">Cantidad</th>
                            </tr>
                        </thead>
                        <tbody id="table-registros-historicos"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="content has-text-centered">
            <p>
                <strong>San Civilization</strong> hecho por <a target="_blank" href="https://intro-camejo.com.ar/">Intro Camejo</a>.
                Por favor, no copiar, te estamos viendo!.
            </p>
        </div>
    </footer>

    <script src="ui.js"></script>
    <script src="registrosHistoricos.js"></script>
    <script>
        getAllRegistrosHistoricos();

        async function avanzarUnAnio(){
            const response = await fetch(`http://localhost:8000/api/v1/simular`, {
                method: "POST",
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({})
            });

            if (response.status == 200) {
                getAllRegistrosHistoricos();
            } else {
                const error = document.getElementById("error");
                error.textContent = response.statusText;
            }
        }
    </script>
  </body>
</html>
