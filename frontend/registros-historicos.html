<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>San Civilization</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
</head>
  <body>
    <div class="container">
        <nav class="navbar" role="navigation" aria-label="main navigation">
            <div class="navbar-brand">
                <a class="navbar-item" href="index.html"><strong>San Civilization</strong></a>

                <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navbarBasicExample">
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
                </a>
            </div>

            <div id="navbarBasicExample" class="navbar-menu">
                <div class="navbar-start">
                <a href="sociedades.html" class="navbar-item">Sociedades</a>
                <a href="eventos.html" class="navbar-item">Eventos</a>
                <a href="grupos-etarios.html" class="navbar-item">Grupos etarios</a>
                <a href="registros-historicos.html" class="navbar-item is-active">Registros historicos</a>
                </div>
            </div>
        </nav>
        <section class="hero">
            <div class="hero-body">
                <p class="title">Registros Históricos</p>
                <a href="empezar-sociedad.html" class="button is-primary">Empezar sociedad</a>
                <button onclick="avanzarUnAnio()" class="button is-info">Avanzar un año</button>
                
                <span id="error"></span>

                <table class="table is-fullwidth">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Sociedad</th>
                            <th>Grupo Etario</th>
                            <th>Año</th>
                            <th>Cantidad</th>
                        </tr>
                    </thead>
                    <tbody id="table-registros-historicos">
                        <tr>
                            <th>...</th>
                            <td>...</td>
                            <td>...</td>
                            <td>...</td>
                            <td>...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <footer class="footer">
            <div class="content has-text-centered">
                <p>
                <strong>San Civilization</strong> hecho por <a target="_blank" href="https://intro-camejo.com.ar/">Intro Camejo</a>.
                Por favor, no copiar, te estamos viendo!.
                </p>
            </div>
        </footer>
    </div>
    <script src="registrosHistoricos.js"></script>
    <script>
        getAllRegistrosHistoricos();

        async function avanzarUnAnio(){
            const response = await fetch(`http://localhost:8000/api/v1/simular`, {
                method: "POST",
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({})
            });

            if (response.status == 200) {
                getAllRegistrosHistoricos();
            } else {
                const error = document.getElementById("error");
                error.textContent = response.statusText;
            }
        }
    </script>
  </body>
</html>
